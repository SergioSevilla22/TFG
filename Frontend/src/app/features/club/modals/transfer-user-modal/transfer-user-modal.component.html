<h2 mat-dialog-title>Traspaso / baja de usuarios</h2>

<div mat-dialog-content class="content">
  <!-- TIPO USUARIO -->
  <div class="tipo-selector">
    <button
      mat-raised-button
      [color]="userType === 'jugador' ? 'primary' : ''"
      (click)="changeType('jugador')"
    >
      Jugadores
    </button>

    <button
      mat-raised-button
      [color]="userType === 'entrenador' ? 'primary' : ''"
      (click)="changeType('entrenador')"
    >
      Entrenadores
    </button>
  </div>

  <!-- LISTADO -->
  <div *ngIf="users.length; else empty">
    <div class="row" *ngFor="let user of users">
      <div class="info">
        <strong>{{ user.nombre }}</strong>
        <div class="muted">DNI: {{ user.DNI }}</div>
      </div>

      <button mat-button color="primary" (click)="select(user)">Gestionar</button>
    </div>
  </div>

  <ng-template #empty>
    <p class="muted">No hay usuarios en este club.</p>
  </ng-template>

  <!-- ACCIONES -->
  <div *ngIf="selectedUser" class="acciones" #accionesSection>
    <h4>Acciones para {{ selectedUser.nombre }}</h4>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Traspasar a otro club</mat-label>
      <mat-select [(ngModel)]="targetClubId">
        <mat-option *ngFor="let club of clubs" [value]="club.id">
          {{ club.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="acciones-botones">
      <button mat-raised-button color="primary" [disabled]="!targetClubId" (click)="transfer()">
        Traspasar
      </button>

      <button mat-raised-button color="warn" (click)="delete()">Eliminar de la plataforma</button>
    </div>
  </div>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cerrar</button>
</div>
