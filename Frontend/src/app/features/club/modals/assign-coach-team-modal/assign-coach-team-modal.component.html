<h2 mat-dialog-title>Asignar entrenador al equipo</h2>

<div mat-dialog-content class="content">
  <mat-form-field appearance="outline" class="full">
    <mat-label>Buscar por DNI o nombre</mat-label>
    <input matInput [(ngModel)]="searchQuery" />
  </mat-form-field>

  <div *ngIf="filteredCoaches.length; else empty">
    <div class="row" *ngFor="let coach of filteredCoaches">
      <div class="info">
        <strong>{{ coach.nombre }}</strong>
        <div class="muted">DNI: {{ coach.DNI }}</div>
        <div class="muted" *ngIf="coach.equipo_nombre">
          Equipo actual: {{ coach.equipo_nombre }}
        </div>
        <div class="muted" *ngIf="!coach.equipo_nombre">Sin equipo</div>
      </div>

      <button mat-raised-button color="primary" (click)="assign(coach.DNI)">
        {{ coach.equipo_id ? 'Mover' : 'Asignar' }}
      </button>
    </div>
  </div>

  <ng-template #empty>
    <p class="muted">No hay entrenadores que coincidan.</p>
  </ng-template>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cerrar</button>
</div>
