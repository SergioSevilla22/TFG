<h2 mat-dialog-title>Asignar entrenador al equipo</h2>

<div mat-dialog-content class="content">
  <mat-form-field appearance="outline" class="full">
    <mat-label>Buscar por DNI o nombre</mat-label>
    <input matInput [(ngModel)]="searchQuery" />
  </mat-form-field>

  @if (errorMessage) {
    <div class="alert alert-danger">{{ errorMessage }}</div>
  }

  <div *ngIf="filteredCoaches.length; else empty">
    <div class="row" *ngFor="let coach of filteredCoaches">
      <div class="info">
        <div class="user-avatar">
          <img *ngIf="coach.foto" [src]="'http://localhost:3000' + coach.foto" class="avatar-img" />
          <div *ngIf="!coach.foto" class="avatar-placeholder">
            {{ coach.nombre[0] }}
          </div>
          <div class="user-data">
            <strong>{{ coach.nombre }}</strong>
            <div class="muted" *ngIf="coach.equipo_nombre">
              Equipo actual: {{ coach.equipo_nombre }}
            </div>
            <div class="muted" *ngIf="!coach.equipo_nombre">Sin equipo</div>
          </div>
        </div>
      </div>

      <button
        mat-raised-button
        color="primary"
        [disabled]="coach.equipo_id === data.equipoId"
        (click)="assign(coach.DNI)"
      >
        {{
          coach.equipo_id === data.equipoId
            ? 'Ya está en este equipo'
            : coach.equipo_id
              ? 'Mover'
              : 'Asignar'
        }}
      </button>
    </div>
  </div>

  <ng-template #empty>
    <p class="muted">No hay entrenadores que coincidan.</p>
  </ng-template>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cerrar</button>
</div>
