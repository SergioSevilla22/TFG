<h2 mat-dialog-title>Gestionar entrenadores del club</h2>

<div mat-dialog-content class="content">
  <mat-form-field appearance="outline" class="full">
    <mat-label>Buscar entrenador (DNI o nombre)</mat-label>
    <input matInput [(ngModel)]="searchQuery" (input)="search()" />
  </mat-form-field>

  <div *ngIf="searchResults.length; else empty">
    <div class="row" *ngFor="let coach of searchResults">
      <div class="info">
        <strong>{{ coach.nombre }}</strong>
        <div class="muted">DNI: {{ coach.DNI }}</div>

        <div class="muted" *ngIf="coach.club_id === data.clubId">Ya pertenece a este club</div>

        <div class="muted" *ngIf="coach.club_id && coach.club_id !== data.clubId">
          Pertenece a otro club
        </div>

        <div class="muted" *ngIf="!coach.club_id">Sin club</div>
      </div>

      <button
        mat-raised-button
        [color]="coach.club_id === data.clubId ? 'warn' : 'primary'"
        (click)="handleCoachAction(coach)"
      >
        {{ coach.club_id === data.clubId ? 'Quitar del club' : 'Añadir al club' }}
      </button>
    </div>
  </div>

  <ng-template #empty>
    <p class="muted">No hay entrenadores que coincidan.</p>
  </ng-template>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cerrar</button>
</div>
