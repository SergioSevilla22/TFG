<div class="modal-header-emerald">
  <h2 mat-dialog-title>Nueva Observación</h2>
  <p class="subtitle">Añade feedback técnico o personal para los jugadores.</p>
</div>

<div mat-dialog-content class="modal-content-emerald">
  <div class="form-grid">
    <div class="field full-width">
      <label>Título de la observación <span class="required">*</span></label>
      <input
        type="text"
        [(ngModel)]="observationForm.titulo"
        placeholder="Ej: Mejora en control orientado"
        class="emerald-input"
        [class.input-error]="submitted && !observationForm.titulo"
      />
      <span class="field-error" *ngIf="submitted && !observationForm.titulo">
        El título es obligatorio
      </span>
    </div>

    <div class="field">
      <label>Categoría <span class="required">*</span></label>
      <select [(ngModel)]="observationForm.categoria" class="emerald-input">
        <option value="general">General</option>
        <option value="técnica">Técnica</option>
        <option value="táctica">Táctica</option>
        <option value="física">Física</option>
        <option value="actitud">Actitud</option>
      </select>
    </div>

    <div class="field">
      <label>Visibilidad <span class="required">*</span></label>
      <select [(ngModel)]="observationForm.visibilidad" class="emerald-input">
        <option value="jugador">Visible para el jugador</option>
        <option value="club">Solo Club/Entrenadores</option>
        <option value="privado">Privado (Solo yo)</option>
      </select>
    </div>

    <div class="field full-width">
      <label>Contenido detallado <span class="required">*</span></label>
      <textarea
        [(ngModel)]="observationForm.contenido"
        rows="4"
        class="emerald-input"
        placeholder="Escribe aquí tu análisis técnico..."
        [class.input-error]="submitted && !observationForm.contenido"
      ></textarea>
      <span class="field-error" *ngIf="submitted && !observationForm.contenido">
        El contenido es obligatorio
      </span>
    </div>
  </div>

  <div class="section-header-emerald margin-top" *ngIf="!data.dniIndividual">
    <mat-icon>groups</mat-icon>
    <span>Seleccionar Jugadores ({{ selected.size }})</span>
  </div>

  <div class="player-selection-wrapper" *ngIf="!data.dniIndividual">
    <div class="player-grid-emerald">
      <label
        class="player-card-option"
        *ngFor="let player of players"
        [class.is-selected]="selected.has(player.DNI)"
      >
        <div class="player-card-content">
          <input
            type="checkbox"
            [checked]="selected.has(player.DNI)"
            (change)="togglePlayer(player.DNI)"
          />
          <div class="avatar-emerald">
            <img *ngIf="player.foto" [src]="'http://localhost:3000' + player.foto" />
            <span *ngIf="!player.foto">{{ player.nombre[0] }}</span>
          </div>
          <span class="player-name">{{ player.nombre }}</span>
        </div>
      </label>
    </div>
    <span class="field-error" *ngIf="submitted && selected.size === 0">
      Selecciona al menos un jugador
    </span>
  </div>

  <div class="error-toast-emerald" *ngIf="message">
    <mat-icon>error</mat-icon>
    <span>{{ message }}</span>
  </div>
</div>

<div mat-dialog-actions align="end" class="modal-actions-emerald">
  <button mat-button (click)="dialogRef.close()" class="btn-cancel-emerald">Cancelar</button>
  <button mat-flat-button [disabled]="loading" (click)="save()" class="btn-save-emerald">
    <mat-icon *ngIf="!loading">check_circle</mat-icon>
    {{ loading ? 'Registrando...' : 'Registrar Observación' }}
  </button>
</div>
