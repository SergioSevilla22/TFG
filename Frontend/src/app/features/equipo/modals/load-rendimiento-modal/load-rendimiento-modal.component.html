<div class="modal-header">
  <h2 mat-dialog-title>Cargar rendimiento del entrenamiento</h2>
  <p class="subtitle">Introduce los datos individuales de cada jugador.</p>
</div>

<div mat-dialog-content class="modal-content">
  <div class="section-title">
    <mat-icon>bar_chart</mat-icon>
    <span>Rendimiento por Jugador</span>
  </div>

  <div class="stats-container">
    <div class="stats-header">
      <span class="player-col">Jugador</span>
      <span>Asistencia</span>
      <span>Nota</span>
      <span>Intensidad</span>
      <span>Actitud</span>
    </div>

    <div class="stats-row" *ngFor="let player of players">
      <div class="player-info">
        <div class="avatar-mini">
          <img
            *ngIf="player.foto"
            [src]="'http://localhost:3000' + player.foto"
            class="avatar-img"
          />
          <span *ngIf="!player.foto">{{ player.nombre[0] }}</span>
        </div>
        <span class="name">{{ player.nombre }}</span>
      </div>

      <select [(ngModel)]="player.estado_asistencia" class="custom-select">
        <option value="presente">Presente</option>
        <option value="tarde">Tarde</option>
        <option value="ausente">Ausente</option>
        <option value="excusado">Excusado</option>
      </select>

      <input
        type="number"
        min="0"
        max="10"
        step="0.1"
        [(ngModel)]="player.nota_general"
        (input)="clampNumber(player, 'nota_general', 0, 10)"
        class="custom-input small"
      />

      <input
        type="number"
        min="0"
        max="10"
        [(ngModel)]="player.intensidad"
        (input)="clampNumber(player, 'intensidad', 0, 10)"
        class="custom-input small"
      />

      <input
        type="number"
        min="0"
        max="10"
        [(ngModel)]="player.actitud"
        (input)="clampNumber(player, 'actitud', 0, 10)"
        class="custom-input small"
      />
    </div>
  </div>
</div>

<div mat-dialog-actions align="end" class="modal-actions">
  <button mat-button (click)="close(false)" class="btn-cancel">Cancelar</button>

  <button mat-flat-button color="primary" (click)="save()" class="btn-publish">
    <mat-icon>save</mat-icon>
    Guardar Rendimiento
  </button>
</div>
