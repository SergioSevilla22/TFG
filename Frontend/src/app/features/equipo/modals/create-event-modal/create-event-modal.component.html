<div class="modal-header">
  <h2 mat-dialog-title>Nuevo Evento</h2>
  <p class="subtitle">Define los detalles de la actividad y gestiona la asistencia.</p>
</div>

<div mat-dialog-content class="modal-content">
  <div class="section-title">
    <mat-icon>event_note</mat-icon>
    <span>Detalles del Evento</span>
  </div>

  <div class="form-grid">
    <div class="field full-width">
      <label>Título del Evento *</label>
      <input
        type="text"
        [(ngModel)]="eventForm.titulo"
        placeholder="Ej: Entrenamiento Táctico"
        class="custom-input"
      />
    </div>

    <div class="field full-width">
      <label>Descripción</label>
      <textarea
        [(ngModel)]="eventForm.descripcion"
        rows="3"
        placeholder="Detalles adicionales, material necesario..."
        class="custom-input"
      ></textarea>
    </div>

    <div class="field">
      <label>Tipo de Evento *</label>
      <div class="select-wrapper">
        <select [(ngModel)]="eventForm.tipo" class="custom-input">
          <option value="entrenamiento">⚽ Entrenamiento</option>
          <option value="partido">🏆 Partido</option>
          <option value="reunion">📋 Reunión</option>
          <option value="otro">✨ Otro</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Fecha y Hora Inicio *</label>
      <input type="datetime-local" [(ngModel)]="eventForm.fecha_inicio" class="custom-input" />
    </div>

    <div class="field">
      <label>Fecha y Hora Fin *</label>
      <input type="datetime-local" [(ngModel)]="eventForm.fecha_fin" class="custom-input" />
    </div>
  </div>

  <div class="section-title margin-top">
    <mat-icon>fact_check</mat-icon>
    <span>Ajustes de Asistencia</span>
  </div>

  <div class="field confirmation-toggle">
    <label class="toggle-container">
      <input
        type="checkbox"
        [(ngModel)]="eventForm.requiere_confirmacion"
        class="custom-checkbox"
      />
      <span class="toggle-text">Este evento requiere confirmación de los jugadores</span>
    </label>
  </div>

  <div class="conditional-section" *ngIf="eventForm.requiere_confirmacion">
    <div class="field">
      <label>Fecha Límite para Confirmar *</label>
      <input
        type="datetime-local"
        [(ngModel)]="eventForm.fecha_limite_confirmacion"
        class="custom-input"
      />
      <small class="helper-text">Pasada esta fecha, los jugadores no podrán responder.</small>
    </div>

    <div class="section-title margin-top-sm">
      <mat-icon>person_add</mat-icon>
      <span>Convocar Jugadores</span>
    </div>

    <div class="player-selection-container">
      <div class="player-list">
        <label class="player-row" *ngFor="let player of players">
          <div class="player-info">
            <input
              type="checkbox"
              [checked]="selected.has(player.DNI)"
              (change)="togglePlayer(player.DNI, $event)"
            />

            <div class="avatar-mini">
              <img
                *ngIf="player.foto"
                [src]="'http://localhost:3000' + player.foto"
                alt="Foto"
                class="avatar-img"
              />
              <span *ngIf="!player.foto">{{ player.nombre[0] | uppercase }}</span>
            </div>

            <span class="name">{{ player.nombre }}</span>
            <span class="dni-tag">{{ player.DNI }}</span>
          </div>
        </label>
      </div>
    </div>
  </div>

  <div class="error-container" *ngIf="message">
    <mat-icon>error_outline</mat-icon>
    <span>{{ message }}</span>
  </div>
</div>

<div mat-dialog-actions align="end" class="modal-actions">
  <button mat-button (click)="close()" class="btn-cancel">Cancelar</button>
  <button mat-flat-button color="primary" [disabled]="loading" (click)="save()" class="btn-publish">
    <mat-icon *ngIf="!loading">add_task</mat-icon>
    {{
      loading
        ? mode === 'editar'
          ? 'Guardando...'
          : 'Creando...'
        : mode === 'editar'
          ? 'Guardar Cambios'
          : 'Crear Evento'
    }}
  </button>
</div>
