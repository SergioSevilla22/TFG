<app-header></app-header>

<div class="equipo-layout" *ngIf="!noTeam && team">
  <app-sidebar-equipo [team]="team" [dni]="activeDni" [teamId]="teamId"> </app-sidebar-equipo>

  <main class="equipo-content">
    <router-outlet></router-outlet>
  </main>
</div>

<div *ngIf="loading" class="loading">Cargando equipo...</div>

<div class="no-team-wrapper" *ngIf="noTeam && !loading">
  <div class="no-team-message">
    <mat-icon class="no-team-icon">group_off</mat-icon>
    <h3>Aún no tienes un equipo asignado</h3>
    <p>Contacta con tu club para que te incluyan en una plantilla y puedas ver tus estadísticas y convocatorias.</p>
  </div>
</div>
